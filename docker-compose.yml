services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: ${DB_USER:-amm}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?Set DB_PASSWORD in .env}
      POSTGRES_DB: ${DB_NAME:-amm}
    ports:
      - "5432:5432"
    volumes:
      - amm_pgdata:/var/lib/postgresql/data

volumes:
  amm_pgdata:
